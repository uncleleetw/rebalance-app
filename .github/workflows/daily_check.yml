name: Market Risk & Rebalance Check

on:
  schedule:
    # 每天台灣時間早上 7:30 自動執行 (UTC 23:30)
    - cron: '30 23 * * *'
  workflow_dispatch: # 保留手動點火測試按鈕

# 🚀 關鍵修正【1】：顯式開啟 Actions 的檔案寫入最高權限，否則 git push 必噴 403 錯誤
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy requests

    - name: Run Check Script
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python cron_check.py

    - name: Commit and Push Updated Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 💡 關鍵修正【2】：指名道姓強迫 Git 追蹤這三個核心 JSON 檔，保證 config.json 狀態完美寫回
        git add risk_history.json historical_baseline.json config.json || true
        
        # 加上 || true 與條件判斷，防範無東西可提交時的報錯中斷
        git diff --quiet && git diff --staged --quiet || git commit -m "自動同步風控軌跡、歷史百分位基準與 config.json 狀態 [skip ci]"
        git push || true
