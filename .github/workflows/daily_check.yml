name: Market Risk & Rebalance Check

on:
  schedule:
    # 每天台灣時間早上 7:30 自動執行 (UTC 23:30)
    - cron: '30 23 * * *'
  workflow_dispatch: # 保留手動點火測試按鈕

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy requests

    - name: Run Check Script
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python cron_check.py

    - name: Commit and Push Updated Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # 🚀 終極防禦：改用萬用字元，只要有任何 json 檔有變動就自動追蹤，不強制指定特定檔名
        git add *.json || true
        # 加上 || true 與條件判斷，防範無東西可提交時的報錯中斷
        git diff --quiet && git diff --staged --quiet || git commit -m "自動同步風控軌跡與歷史百分位基準庫 [skip ci]"
        git push || true
