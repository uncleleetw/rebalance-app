name: Market Risk & Rebalance Check
on:
  schedule:
    # 每天台灣時間早上 7:30 自動執行 (UTC 23:30)
    - cron: '30 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Check Script
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python cron_check.py

    - name: Commit and Push Updated Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add risk_history.json historical_baseline.json config.json
        # 沒有變更就跳過 commit；有變更則 commit 並推送，推送失敗要真的報錯
        if ! git diff --staged --quiet; then
          git commit -m "自動同步風控軌跡、歷史百分位基準與 config.json 狀態 [skip ci]"
          git pull --rebase origin main
          git push
        else
          echo "狀態檔無變更，跳過提交"
        fi
